document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

reas registradas.<\u002Fp>\n\n        <div style=\"display:flex;flex-wrap:wrap;gap:20px\">\n          <div style=\"flex:1;min-width:280px;border:1px solid #ebedf1;border-radius:14px;padding:20px;background:#fcfcfd\">\n            <div style=\"font-size:14px;font-weight:700;margin-bottom:14px\">Completadas por persona<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:12px\">\n              <sc-for list=\"{{ byPerson }}\" as=\"row\" hint-placeholder-count=\"0\">\n                <div>\n                  <div style=\"display:flex;justify-content:space-between;font-size:12px;color:#4b5563;margin-bottom:4px\">\n                    <span>{{ row.name }}<\u002Fspan><span style=\"font-weight:700;color:#111318\">{{ row.count }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"height:8px;border-radius:6px;background:#eef0f3;overflow:hidden\">\n                    <div style=\"height:100%;border-radius:6px;background:{{ row.color }};width:{{ row.pct }}\"><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <sc-if value=\"{{ noReportData }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"font-size:13px;color:#b3b8c2\">Aún no hay tareas completadas.<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"flex:1;min-width:280px;border:1px solid #ebedf1;border-radius:14px;padding:20px;background:#fcfcfd\">\n            <div style=\"font-size:14px;font-weight:700;margin-bottom:14px\">Tendencia semanal<\u002Fdiv>\n            <div style=\"display:flex;align-items:flex-end;gap:10px;height:110px\">\n              <sc-for list=\"{{ weekly }}\" as=\"d\" hint-placeholder-count=\"7\">\n                <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end\">\n                  <div style=\"width:100%;max-width:26px;border-radius:5px 5px 0 0;background:#2563eb;height:{{ d.barHeight }}\"><\u002Fdiv>\n                  <div style=\"font-size:10px;color:#9aa1ad\">{{ d.label }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"flex:1.4;min-width:320px;border:1px solid #ebedf1;border-radius:14px;padding:20px;background:#fcfcfd\">\n            <div style=\"font-size:14px;font-weight:700;margin-bottom:14px\">Tareas vencidas<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:10px\">\n              <sc-for list=\"{{ overdueReport }}\" as=\"t\" hint-placeholder-count=\"0\">\n                <div sc-camel-on-click=\"{{ t.openFn }}\" style=\"display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;cursor:pointer;background:#fef2f2\">\n                  <span style=\"font-size:13px;color:#111318\">{{ t.title }}<\u002Fspan>\n                  <span style=\"font-size:12px;color:#dc2626;font-weight:600\">{{ t.dateLabel }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <sc-if value=\"{{ noOverdue }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"font-size:13px;color:#b3b8c2\">Sin tareas vencidas. Buen trabajo.<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ showVoiceButton }}\" hint-placeholder-val=\"{{ false }}\">\n    <div sc-camel-on-click=\"{{ startVoiceCapture }}\" style=\"{{ voiceBtnStyle }}\" title=\"Agregar tarea por voz\">\n      <svg width=\"22\" height=\"22\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\">\n        <path d=\"M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3Z\" stroke=\"#ffffff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n        <path d=\"M19 11a7 7 0 0 1-14 0\" stroke=\"#ffffff\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath>\n        <path d=\"M12 18v3\" stroke=\"#ffffff\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath>\n      <\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isMobile }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"{{ bottomTabStyle }}\">\n      <div sc-camel-on-click=\"{{ goInboxM }}\" style=\"{{ tabInboxStyle }}\"><span>Bandeja<\u002Fspan><\u002Fdiv>\n      <div sc-camel-on-click=\"{{ goTodayM }}\" style=\"{{ tabTodayStyle }}\"><span>Hoy<\u002Fspan><\u002Fdiv>\n      <div sc-camel-on-click=\"{{ goUpcomingM }}\" style=\"{{ tabUpcomingStyle }}\"><span>Próximas<\u002Fspan><\u002Fdiv>\n      <div sc-camel-on-click=\"{{ goReportsM }}\" style=\"{{ tabReportsStyle }}\"><span>Reportes<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ hasEditingTask }}\" hint-placeholder-val=\"{{ false }}\">\n    <div sc-camel-on-click=\"{{ closeEditIfBackdrop }}\" style=\"position:fixed;inset:0;background:rgba(17,19,24,0.35);display:flex;align-items:center;justify-content:center;z-index:50\">\n      <div sc-camel-on-click=\"{{ stopProp }}\" style=\"width:440px;max-width:92vw;background:#fff;border-radius:16px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.18)\">\n        <input value=\"{{ editTitle }}\" sc-camel-on-change=\"{{ onEditTitleChange }}\" placeholder=\"Título\" style=\"width:100%;font-size:17px;font-weight:700;border:none;padding:4px 0;margin-bottom:6px;border-bottom:1px solid #eef0f3\">\n        <textarea value=\"{{ editNotes }}\" sc-camel-on-change=\"{{ onEditNotesChange }}\" placeholder=\"Notas...\" style=\"width:100%;min-height:64px;border:1px solid #e5e7eb;border-radius:8px;padding:10px;font-size:13px;color:#4b5563;margin:10px 0;resize:vertical\"><\u002Ftextarea>\n\n        <div style=\"display:flex;gap:10px;margin-bottom:12px\">\n          <div style=\"flex:1\">\n            <div style=\"font-size:11px;color:#9aa1ad;font-weight:700;text-transform:uppercase;margin-bottom:4px\">Fecha<\u002Fdiv>\n            <input type=\"date\" value=\"{{ editDate }}\" sc-camel-on-change=\"{{ onEditDateChange }}\" style=\"width:100%;padding:8px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px\">\n          <\u002Fdiv>\n          <div style=\"flex:1\">\n            <div style=\"font-size:11px;color:#9aa1ad;font-weight:700;text-transform:uppercase;margin-bottom:4px\">Proyecto<\u002Fdiv>\n            <sc-raw-select value=\"{{ editProjectId }}\" sc-camel-on-change=\"{{ onEditProjectChange }}\" style=\"width:100%;padding:8px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;background:#fff\">\n              <option value=\"\">Sin proyecto<\u002Foption>\n              <sc-for list=\"{{ projects }}\" as=\"proj\" hint-placeholder-count=\"0\">\n                <option value=\"{{ proj.id }}\">{{ proj.name }}<\u002Foption>\n              <\u002Fsc-for>\n            <\u002Fsc-raw-select>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-bottom:18px\">\n          <div style=\"font-size:11px;color:#9aa1ad;font-weight:700;text-transform:uppercase;margin-bottom:4px\">Asignado a<\u002Fdiv>\n          <sc-raw-select value=\"{{ editAssigneeId }}\" sc-camel-on-change=\"{{ onEditAssigneeChange }}\" style=\"width:100%;padding:8px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;background:#fff\">\n            <option value=\"\">Sin asignar<\u002Foption>\n            <sc-for list=\"{{ members }}\" as=\"mem\" hint-placeholder-count=\"0\">\n              <option value=\"{{ mem.id }}\">{{ mem.name }}<\u002Foption>\n            <\u002Fsc-for>\n          <\u002Fsc-raw-select>\n        <\u002Fdiv>\n\n        <div style=\"margin-bottom:18px\">\n          <div style=\"font-size:11px;color:#9aa1ad;font-weight:700;text-transform:uppercase;margin-bottom:4px\">Repetir<\u002Fdiv>\n          <sc-raw-select value=\"{{ editRecurrence }}\" sc-camel-on-change=\"{{ onEditRecurrenceChange }}\" style=\"width:100%;padding:8px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;background:#fff\">\n            <option value=\"\">No repetir<\u002Foption>\n            <option value=\"daily\">Diaria<\u002Foption>\n            <option value=\"weekly\">Semanal<\u002Foption>\n            <option value=\"monthly\">Mensual<\u002Foption>\n          <\u002Fsc-raw-select>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;justify-content:space-between;align-items:center\">\n          <div sc-camel-on-click=\"{{ deleteEditingTask }}\" style=\"color:#dc2626;font-size:13px;font-weight:600;cursor:pointer\">Eliminar<\u002Fdiv>\n          <div style=\"display:flex;gap:8px\">\n            <div sc-camel-on-click=\"{{ closeEdit }}\" style=\"padding:10px 16px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;color:#4b5563\">Cancelar<\u002Fdiv>\n            <div sc-camel-on-click=\"{{ closeEdit }}\" style=\"padding:10px 18px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;background:#2563eb;color:#fff\">Guardar<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\n\nconst PALETTE = ['#2563eb','#16a34a','#f59e0b','#dc2626','#7c3aed','#0891b2','#db2777','#65a30d'];\n\nfunction isoToday() {\n  const d = new Date();\n  return d.toISOString().slice(0,10);\n}\nfunction addDaysIso(base, n) {\n  const d = new Date(base + 'T00:00:00');\n  d.setDate(d.getDate() + n);\n  return d.toISOString().slice(0,10);\n}\nfunction initialsOf(name) {\n  const parts = name.trim().split(/\\s+/);\n  const a = parts[0] && parts[0][0] ? parts[0][0] : '';\n  const b = parts[1] && parts[1][0] ? parts[1][0] : '';\n  return (a + b).toUpperCase() || '?';\n}\nfunction fmtLabel(iso) {\n  const d = new Date(iso + 'T00:00:00');\n  return d.toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric', month: 'short' });\n}\n\nclass Component extends DCLogic {\n  state = {\n    view: 'today',\n    tasks: [],\n    projects: [],\n    members: [],\n    editingId: null,\n    draggingId: null,\n    showProjectInput: false,\n    showMemberInput: false,\n    newProjectName: '',\n    newMemberName: '',\n    quickAdd: { inbox: '', today: '', upcoming: '' },\n    editDraft: null,\n    filterAssigneeId: null,\n    filterProjectId: null,\n    isMobile: false,\n    drawerOpen: false,\n    renamingKey: null,\n    renameValue: '',\n    listening: false,\n    voiceSupported: true,\n  };\n\n  startVoiceCapture = () => {\n    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;\n    if (!SR) { this.setState({ voiceSupported: false }); return; }\n    if (this.state.listening) return;\n    const rec = new SR();\n    rec.lang = 'es-ES';\n    rec.interimResults = false;\n    rec.maxAlternatives = 1;\n    rec.onstart = () => this.setState({ listening: true });\n    rec.onerror = () => this.setState({ listening: false });\n    rec.onend = () => this.setState({ listening: false });\n    rec.onresult = (event) => {\n      const text = event.results[0][0].transcript;\n      if (text && text.trim()) {\n        const view = this.state.view;\n        let due = null;\n        if (view === 'today') due = isoToday();\n        else if (view === 'upcoming') due = addDaysIso(isoToday(), 1);\n        this.addTaskFromVoice(text.trim(), due);\n      }\n    };\n    this._recognition = rec;\n    rec.start();\n  };\n\n  componentDidMount() {\n    this.checkMobile = () => this.setState({ isMobile: window.innerWidth <= 760 });\n    this.checkMobile();\n    window.addEventListener('resize', this.checkMobile);\n\n    try {\n      const saved = localStorage.getItem('tareas-diarias-data');\n      if (saved) {\n        const data = JSON.parse(saved);\n        this.setState({ tasks: data.tasks || [], projects: data.projects || [], members: data.members || [] });\n      }\n    } catch (e) {}\n\n    this._applyingRemote = false;\n    const attachFirestore = () => {\n      if (!window.__fbDb) { setTimeout(attachFirestore, 100); return; }\n      this._docRef = window.__fbDb.collection('boards').doc('equipo');\n      this._unsub = this._docRef.onSnapshot((snap) => {\n        if (!snap.exists) return;\n        const data = snap.data() || {};\n        this._applyingRemote = true;\n        this.setState({ tasks: data.tasks || [], projects: data.projects || [], members: data.members || [] }, () => {\n          this._applyingRemote = false;\n        });\n      }, (err) => console.error('Firestore sync error', err));\n    };\n    attachFirestore();\n\n    this.flushSync = () => {\n      clearTimeout(this._syncTimer);\n      if (this._applyingRemote || !this._docRef) return;\n      this._docRef.set({ tasks: this.state.tasks, projects: this.state.projects, members: this.state.members }).catch(e => console.error('Firestore write error', e));\n    };\n    this._onVisibilityChange = () => { if (document.hidden) this.flushSync(); };\n    document.addEventListener('visibilitychange', this._onVisibilityChange);\n    window.addEventListener('pagehide', this.flushSync);\n    window.addEventListener('beforeunload', this.flushSync);\n  }\n  componentWillUnmount() {\n    window.removeEventListener('resize', this.checkMobile);\n    document.removeEventListener('visibilitychange', this._onVisibilityChange);\n    window.removeEventListener('pagehide', this.flushSync);\n    window.removeEventListener('beforeunload', this.flushSync);\n    if (this._unsub) this._unsub();\n  }\n  componentDidUpdate() {\n    try {\n      localStorage.setItem('tareas-diarias-data', JSON.stringify({ tasks: this.state.tasks, projects: this.state.projects, members: this.state.members }));\n    } catch (e) {}\n    if (this._applyingRemote || !this._docRef) return;\n    clearTimeout(this._syncTimer);\n    this._syncTimer = setTimeout(() => {\n      this._docRef.set({ tasks: this.state.tasks, projects: this.state.projects, members: this.state.members }).catch(e => console.error('Firestore write error', e));\n    }, 400);\n  }\n\n  toggleFilterAssignee = (id) => this.setState(s => ({ filterAssigneeId: s.filterAssigneeId === id ? null : id, filterProjectId: null, drawerOpen: s.isMobile ? false : s.drawerOpen }));\n  toggleFilterProject = (id) => this.setState(s => ({ filterProjectId: s.filterProjectId === id ? null : id, filterAssigneeId: null, drawerOpen: s.isMobile ? false : s.drawerOpen }));\n  clearFilter = () => this.setState({ filterAssigneeId: null, filterProjectId: null });\n  toggleDrawer = () => this.setState(s => ({ drawerOpen: !s.drawerOpen }));\n  closeDrawer = () => this.setState({ drawerOpen: false });\n  navAndCloseDrawer(view) { this.setState({ view, drawerOpen: false }); }\n\n  startRenameProject = (id, name) => this.setState({ renamingKey: 'proj:' + id, renameValue: name });\n  startRenameMember = (id, name) => this.setState({ renamingKey: 'mem:' + id, renameValue: name });\n  onRenameChange = (e) => this.setState({ renameValue: e.target.value });\n  cancelRename = () => this.setState({ renamingKey: null, renameValue: '' });\n  commitRename = () => {\n    const key = this.state.renamingKey;\n    const val = this.state.renameValue.trim();\n    if (!key) return;\n    if (!val) { this.setState({ renamingKey: null }); return; }\n    const [type, id] = key.split(':');\n    if (type === 'proj') {\n      this.setState(s => ({ projects: s.projects.map(p => p.id === id ? { ...p, name: val } : p), renamingKey: null }));\n    } else {\n      this.setState(s => ({ members: s.members.map(m => m.id === id ? { ...m, name: val, initials: initialsOf(val) } : m), renamingKey: null }));\n    }\n  };\n  onRenameKeyDown = (e) => { if (e.key === 'Enter') this.commitRename(); if (e.key === 'Escape') this.cancelRename(); };\n\n  removeProject = (id, name) => {\n    if (!window.confirm('¿Eliminar el proyecto \"' + name + '\"? Las tareas asociadas quedarán sin proyecto.')) return;\n    this.setState(s => ({\n      projects: s.projects.filter(p => p.id !== id),\n      tasks: s.tasks.map(t => t.projectId === id ? { ...t, projectId: '' } : t),\n      filterProjectId: s.filterProjectId === id ? null : s.filterProjectId,\n    }));\n  };\n  removeMember = (id, name) => {\n    if (!window.confirm('¿Eliminar a \"' + name + '\" del equipo? Sus tareas quedarán sin asignar.')) return;\n    this.setState(s => ({\n      members: s.members.filter(m => m.id !== id),\n      tasks: s.tasks.map(t => t.assigneeId === id ? { ...t, assigneeId: '' } : t),\n      filterAssigneeId: s.filterAssigneeId === id ? null : s.filterAssigneeId,\n    }));\n  };\n\n  navClick(view) { this.setState({ view }); }\n\n  toggleProjectInput = () => this.setState(s => ({ showProjectInput: !s.showProjectInput }));\n  toggleMemberInput = () => this.setState(s => ({ showMemberInput: !s.showMemberInput }));\n  onProjectNameChange = (e) => this.setState({ newProjectName: e.target.value });\n  onMemberNameChange = (e) => this.setState({ newMemberName: e.target.value });\n\n  addProject(name) {\n    const n = name.trim();\n    if (!n) return;\n    this.setState(s => ({\n      projects: [...s.projects, { id: 'p' + Date.now(), name: n, color: PALETTE[s.projects.length % PALETTE.length] }],\n      newProjectName: '', showProjectInput: false,\n    }));\n  }\n  addMember(name) {\n    const n = name.trim();\n    if (!n) return;\n    this.setState(s => ({\n      members: [...s.members, { id: 'm' + Date.now(), name: n, color: PALETTE[(s.members.length + 3) % PALETTE.length], initials: initialsOf(n) }],\n      newMemberName: '', showMemberInput: false,\n    }));\n  }\n  onProjectKeyDown = (e) => { if (e.key === 'Enter') this.addProject(this.state.newProjectName); };\n  onMemberKeyDown = (e) => { if (e.key === 'Enter') this.addMember(this.state.newMemberName); };\n  submitProject = () => this.addProject(this.state.newProjectName);\n  submitMember = () => this.addMember(this.state.newMemberName);\n\n  onQuickAddChange = (key, e) => this.setState(s => ({ quickAdd: { ...s.quickAdd, [key]: e.target.value } }));\n\n  addTask(title, dueDate) {\n    const t = title.trim();\n    if (!t) return;\n    this.setState(s => ({\n      tasks: [...s.tasks, {\n        id: 't' + Date.now() + Math.random().toString(36).slice(2,6),\n        title: t, notes: '', projectId: '', assigneeId: '', dueDate: dueDate || null, recurrence: '',\n        completed: false, completedAt: null, order: s.tasks.length, createdAt: Date.now(),\n      }],\n    }));\n  }\n  addTaskFromVoice(rawText, dueDate) {\n    let text = rawText.trim();\n    const norm = (s) => s.toLowerCase().normalize('NFD').replace(/[\\u0300-\\u036f]/g, '').replace(/[^a-z0-9\\s]/g, '').trim();\n    const escapeRegex = (s) => s.replace(/[.*+?^${}()|[\\]\\\\]/g, '\\\\$&');\n\n    let projectId = '';\n    let assigneeId = '';\n\n    // Proyecto: solo se asigna si el nombre dicho coincide con un proyecto YA existente (no se crean proyectos por voz).\n    const sortedProjects = [...this.state.projects].sort((a, b) => b.name.length - a.name.length);\n    for (const p of sortedProjects) {\n      const re = new RegExp('\\\\bproyecto\\\\s+' + escapeRegex(p.name) + '\\\\b', 'i');\n      const m = text.match(re);\n      if (m) { projectId = p.id; text = text.replace(m[0], ' '); break; }\n    }\n    // Fallback tolerante a acentos/mayúsculas si no hubo match exacto.\n    if (!projectId) {\n      const genericMatch = text.match(/\\bproyecto\\s+(.+?)(?=\\s+(?:asignad[oa]\\s+a|asignar\\s+a)\\s+|\\s*$)/i);\n      if (genericMatch) {\n        const rawName = genericMatch[1].trim().replace(/[.,]$/, '');\n        const found = this.state.projects.find(p => norm(p.name) === norm(rawName));\n        if (found) { projectId = found.id; text = text.replace(genericMatch[0], ' '); }\n      }\n    }\n\n    // Asignado a / asignada a / asignar a <nombre>: se crea el miembro si no existe, usando el nombre completo dicho.\n    // (\"para\" se excluye como disparador: es una palabra común en títulos y causaba falsos positivos.)\n    let newMember = null;\n    const memberMatch = text.match(/\\basignad?[oa]?\\s+a\\s+(.+?)(?=\\s+proyecto\\s+|\\s*$)/i);\n    if (memberMatch) {\n      const rawName = memberMatch[1].trim().replace(/[.,]$/, '');\n      const found = this.state.members.find(m => norm(m.name) === norm(rawName));\n      if (found) {\n        assigneeId = found.id;\n      } else {\n        assigneeId = 'm' + Date.now() + Math.random().toString(36).slice(2, 6);\n        newMember = { id: assigneeId, name: rawName };\n      }\n      text = text.replace(memberMatch[0], ' ');\n    }\n\n    text = text.replace(/[,]+/g, ' ').replace(/\\s{2,}/g, ' ').trim().replace(/[.,]$/, '');\n    const title = text.trim();\n    if (!title) return;\n\n    this.setState(s => ({\n      members: newMember ? [...s.members, newMember] : s.members,\n      tasks: [...s.tasks, {\n        id: 't' + Date.now() + Math.random().toString(36).slice(2,6),\n        title, notes: '', projectId, assigneeId, dueDate: dueDate || null, recurrence: '',\n        completed: false, completedAt: null, order: s.tasks.length, createdAt: Date.now(),\n      }],\n    }));\n  }\n\n  submitQuickAdd(key) {\n    const val = this.state.quickAdd[key];\n    let due = null;\n    if (key === 'today') due = isoToday();\n    if (key === 'upcoming') due = addDaysIso(isoToday(), 1);\n    this.addTask(val, due);\n    this.setState(s => ({ quickAdd: { ...s.quickAdd, [key]: '' } }));\n  }\n  onQuickAddKey(key, e) { if (e.key === 'Enter') this.submitQuickAdd(key); }\n\n  toggleComplete = (id) => {\n    this.setState(s => {\n      const target = s.tasks.find(t => t.id === id);\n      if (!target) return null;\n      const nowCompleting = !target.completed;\n      const tasks = s.tasks.map(t => t.id === id ? { ...t, completed: nowCompleting, completedAt: nowCompleting ? isoToday() : null } : t);\n      setTimeout(() => this.flushSync && this.flushSync(), 0);\n      if (nowCompleting && target.recurrence) {\n        const base = target.dueDate
